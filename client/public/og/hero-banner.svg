<!--
  Hero banner for the landing-page hero card. The OG cover.png had a
  baked-in pill button + tagline that double-stamped the chrome below
  it (the hero card already renders its own <h1> + login CTA), and the
  small top-wordmark in the nav was the only place the actual brand
  wordmark lived. This banner promotes the logo wordmark to the hero
  spot — same forest-radial backdrop and brass queen sigil as
  cover.svg, but stripped of the duplicate "Raise. Raid. Rise."
  tagline + "PLAY NOW" button so the in-page CTA is the only one.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="80%">
      <stop offset="0%" stop-color="#2a3f2d"/>
      <stop offset="55%" stop-color="#142117"/>
      <stop offset="100%" stop-color="#060b07"/>
    </radialGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd98a"/>
      <stop offset="100%" stop-color="#b8883a"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#ffd98a" stop-opacity="0.32"/>
      <stop offset="60%" stop-color="#ffd98a" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffd98a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#halo)"/>

  <!-- Queen sigil — sits behind the wordmark, lower-center, so the
       logo reads first and the queen frames it without competing. -->
  <g transform="translate(600 460)" fill="url(#brass)" stroke="#5c4020" stroke-width="8" stroke-linejoin="round" opacity="0.95">
    <ellipse cx="0" cy="80" rx="160" ry="125"/>
    <circle cx="0" cy="-30" r="92"/>
    <circle cx="0" cy="-180" r="68"/>
    <line x1="-92" y1="-230" x2="-160" y2="-320" stroke="#5c4020" stroke-width="12" stroke-linecap="round"/>
    <line x1="92" y1="-230" x2="160" y2="-320" stroke="#5c4020" stroke-width="12" stroke-linecap="round"/>
    <circle cx="-160" cy="-320" r="14" fill="#5c4020"/>
    <circle cx="160" cy="-320" r="14" fill="#5c4020"/>
  </g>

  <!-- Wordmark. Same brand treatment as /units/logo-hivewars.svg
       (white fill, dark stroke, paint-order: stroke fill) so the
       small nav wordmark and this hero wordmark read as one brand
       mark at different sizes. Sized for the 1200×630 frame and
       anchored top-center. -->
  <g font-family="'Arial Black', 'Helvetica Neue', Impact, sans-serif"
     font-weight="900" letter-spacing="4" text-anchor="middle"
     paint-order="stroke fill" fill="#ffffff" stroke="#2d1b0e" stroke-width="14">
    <text x="600" y="200" font-size="148">HIVE</text>
    <text x="600" y="330" font-size="148">WARS</text>
  </g>

  <!-- Faint moss specks scatter — texture without competing with
       the central composition. -->
  <g fill="#bad3a3" opacity="0.35">
    <circle cx="120" cy="120" r="3"/>
    <circle cx="200" cy="540" r="2"/>
    <circle cx="980" cy="160" r="3"/>
    <circle cx="1080" cy="470" r="2"/>
    <circle cx="320" cy="80" r="2"/>
    <circle cx="900" cy="80" r="2"/>
  </g>
</svg>
